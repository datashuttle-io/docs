[book]
title = "DataShuttle Documentation"
authors = ["Evgeny Stepanov"]
language = "en"
src = "src"

[output.html]
# Respect the visitor's OS preference — light by default, navy when the
# system prefers dark. The brand overlay at theme/brand-v2.css retints
# both onto the quiet-technical palette (paper + ink + slate-teal accent).
# File is versioned (brand-v2.css) to bypass Cloudflare's 30-day edge
# cache on the prior v1 brand.css.
default-theme = "light"
preferred-dark-theme = "navy"
additional-css = ["theme/brand-v5.css"]
additional-js = ["theme/theme-sync.js"]
# Default for the binary-embedded build (served at /docs/ on the api).
# The Cloudflare Pages build for the standalone docs.datashuttle.ai
# subdomain overrides this to "/" at build time:
#   sed -i 's|site-url = "/docs/"|site-url = "/"|' book.toml && mdbook build
site-url = "/docs/"
# Public docs repo — source lives at datashuttle-io/datashuttle-docs
# (Cloudflare-Pages-deployed mdbook). The main monorepo pulls it in
# as a git submodule at docs/book/. "Edit this page" lets readers
# open issues / PRs against the public docs repo.
git-repository-url = "https://github.com/datashuttle-io/datashuttle-docs"
edit-url-template = "https://github.com/datashuttle-io/datashuttle-docs/edit/main/src/{path}"
