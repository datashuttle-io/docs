[book]
title = "DataShuttle Documentation"
authors = ["Evgeny Stepanov"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
# Brand theme overlay — paper/ink palette, signal-orange spine, IBM
# Plex / Instrument Serif / JetBrains Mono. Leaves mdBook's base CSS
# intact and only overrides the variables it exposes.
additional-css = ["theme/brand-v2.css"]
# Default for the binary-embedded build (served at /docs/ on the api).
# The website Dockerfile overrides this to "/" at build time for the
# standalone docs.datashuttle.ai subdomain. See website/Dockerfile.
site-url = "/docs/"
# Public product repo — source still lives in a private mirror, but
# docs are kept in-sync and the "Edit this page" link lets readers
# open issues / PRs against the public repo. If the docs sync ever
# drifts from the private source, update these two lines.
git-repository-url = "https://github.com/datashuttle-ai/datashuttle"
edit-url-template = "https://github.com/datashuttle-ai/datashuttle/edit/main/docs/book/src/{path}"
