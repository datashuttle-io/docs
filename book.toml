[book]
title = "DataShuttle Documentation"
authors = ["Evgeny Stepanov"]
language = "en"
src = "src"

[output.html]
# Respect the visitor's OS preference — light by default, navy when the
# system prefers dark. The brand overlay at theme/brand-v6.css rebuilds
# both onto Design System v3 (cool paper + ink, vivid spring-teal accent
# #1FC3A1 primary, slate-teal calm secondary, Inter Tight + JetBrains Mono
# + Source Serif 4, v3 syntax tokens). File is versioned (brand-v6.css) to
# bypass Cloudflare's 30-day edge cache on the prior brand-v5.css.
default-theme = "light"
preferred-dark-theme = "navy"
additional-css = ["theme/brand-v6.css"]
additional-js = ["theme/theme-sync.js"]
# Default for the binary-embedded build (served at /docs/ on the api).
# The Cloudflare Pages build for the standalone docs.datashuttle.ai
# subdomain overrides this to "/" at build time:
#   sed -i 's|site-url = "/docs/"|site-url = "/"|' book.toml && mdbook build
site-url = "/docs/"
# Public docs repo — source lives at datashuttle-io/docs
# (Cloudflare-Pages-deployed mdbook). The main monorepo pulls it in
# as a git submodule at docs/book/. "Edit this page" lets readers
# open issues / PRs against the public docs repo.
git-repository-url = "https://github.com/datashuttle-io/docs"
edit-url-template = "https://github.com/datashuttle-io/docs/edit/main/src/{path}"
